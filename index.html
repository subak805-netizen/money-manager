<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>머니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  /* ── 원시 토큰 (FPF 파운데이션 공통 · 테마 무관) ── */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px;
  --h-s:28px; --h-m:34px; --h-l:42px; --h-touch:44px;
  --t-caption:11px; --t-label:12px; --t-body:13px; --t-title:15px; --t-h:18px; --t-display:30px;
  --lh-tight:1.3; --lh-body:1.55; --fw-reg:400; --fw-med:600; --fw-bold:700; --fw-x:800;
  --content-max:520px;
  /* ── 의미 토큰 (머니 = 깔끔한 뉴트럴 · FPF 이름 규칙) ── */
  --page-bg:#F4F5F6; --card-bg:#FFFFFF; --text:#1A1A1C; --t2:#6E7177; --t3:#A8ABB2;
  --card-bd:#ECEDEF; --card-bdw:1px;
  --input-bg:#FFFFFF; --input-bd:#ECEDEF;
  --accent:#13B68B; --accent-bg:#E6F7F1; --on-accent:#fff;
  --ok:#0E9E72; --red:#E5484D; --warn:#E0982F;
  --ink:#1C1C1F;
  --chip:#F1F2F4; --chip-ic:#54575E; --dark:#1C1C1F;
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-pill:999px;
  --el-1:0 1px 2px rgba(20,20,30,.05), 0 4px 14px -10px rgba(20,20,40,.12);
  --el-2:0 1px 2px rgba(20,20,30,.05), 0 10px 28px -16px rgba(20,20,40,.14);
  --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",system-ui,"Pretendard Variable",Pretendard,"Segoe UI",sans-serif;
  --font-display:var(--font);
  /* ── 레거시 별칭 (본문 CSS 호환 · 값 동일) ── */
  --bg:var(--page-bg); --card:var(--card-bg); --line:var(--card-bd);
  --accent-soft:var(--accent-bg); --income:var(--ok); --neg:var(--red);
  --r:var(--r-lg); --sh:var(--el-2); --sh-sm:var(--el-1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%;letter-spacing:-.012em;font-feature-settings:"tnum"}
svg{display:block}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input,select,button,textarea{font-family:inherit;font-size:14px;-webkit-appearance:none;appearance:none;letter-spacing:-.012em}
input,select,textarea{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0 14px;height:46px;color:var(--text);width:100%;transition:border-color .15s}
input::placeholder{color:var(--t3)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236B6B73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 15px center;padding-right:36px}
.tnum{font-variant-numeric:tabular-nums}

.shell{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:154px;background:linear-gradient(180deg,#FFFFFF 0%,var(--bg) 220px)}
#pane-ledger,#pane-budget,#pane-asset,#pane-forecast{animation:fadeUp .3s cubic-bezier(.2,.7,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 12px}
.logo{font-size:23px;font-weight:800;letter-spacing:-.04em}
.logo b{color:var(--accent)}
.cloud{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px;font-weight:500;border:none;background:none;font-family:inherit;cursor:pointer;padding:6px 11px;border-radius:11px}
.cloud:active{background:var(--chip)}
.cloud .dot{width:7px;height:7px;border-radius:50%;background:#CFCFD6}
.cloud.on{color:var(--text);font-weight:600}
.cloud.on .dot{background:var(--accent)}
.auth-info{font-size:13.5px;color:var(--t2);line-height:1.6;margin:0 0 16px;font-weight:500}
.auth-info b{color:var(--text)}

.month-nav{display:flex;align-items:center;justify-content:center;gap:8px;padding:2px 20px 16px}
.month-nav button{background:none;border:none;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;border-radius:50%;transition:background .15s}
.month-nav button:active{background:#E9E9EE}
.month-nav .m{font-size:18px;font-weight:800;min-width:120px;text-align:center;letter-spacing:-.03em}

.lbl-row{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 9px}
.lbl-row .t{font-size:12.5px;color:var(--t2);font-weight:700;letter-spacing:.01em}
.lbl-row .mini{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer}

.card{background:var(--card);border-radius:var(--r);margin:0 16px 13px;box-shadow:var(--sh);overflow:hidden}
.row{display:flex;align-items:center;gap:13px;padding:14px 17px}
.row:not(:first-child){box-shadow:inset 0 1px 0 var(--line)}
.ic{width:38px;height:38px;border-radius:12px;background:var(--chip);color:var(--chip-ic);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic.sm{width:32px;height:32px;border-radius:10px}
.row .mid{flex:1;min-width:0}
.row .nm{font-size:15px;font-weight:600;letter-spacing:-.02em}
.row .sub{font-size:12.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.row .amt{font-size:15.5px;font-weight:700;letter-spacing:-.03em}
.row .amt.inc{color:var(--income)}
.row .amt.neg{color:var(--neg)}
.row .del{background:none;border:none;color:var(--t3);width:28px;height:28px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
.row .del:active{background:#F2F2F5;color:var(--neg)}
.row.tap{cursor:pointer}
.row.tap:active{background:#FAFAFB}
.pill-auto{font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-soft);padding:1px 6px;border-radius:6px;margin-left:6px;letter-spacing:0;vertical-align:1px}

.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border-radius:var(--r);margin:0 16px 8px;overflow:hidden;box-shadow:var(--sh)}
.sum-box{background:var(--card);padding:17px 10px;text-align:center}
.sum-box .l{font-size:12px;color:var(--t3);margin-bottom:7px;font-weight:600}
.sum-box .v{font-size:17px;font-weight:800;letter-spacing:-.04em}
.sum-box .v.inc{color:var(--income)}
.quick{display:flex;gap:8px;align-items:center;margin:10px 16px 3px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 6px 6px 16px;box-shadow:var(--sh-sm)}
.quick input{border:none;height:42px;padding:0;background:none;font-size:14.5px;font-weight:500;flex:1;border-radius:0}
.quick input:focus{box-shadow:none}
.quick .qbtn{width:42px;height:42px;border-radius:11px;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .12s}
.quick .qbtn:active{transform:scale(.93)}
.q-hint{margin:3px 26px 4px;font-size:12.5px;color:var(--t2);font-weight:600;min-height:17px}
.q-hint .cat{color:var(--income);font-weight:700}
.q-hint b{color:var(--accent);font-weight:700}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 16px 2px;width:calc(100% - 32px);height:46px;border:1px dashed #D2D4D8;border-radius:14px;background:transparent;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer}
.upload-btn:active{background:var(--accent-soft)}
.csv-desc{font-size:13.5px;color:var(--t2);line-height:1.6;margin:0 2px 16px;font-weight:500}
.csv-pick{width:100%;height:48px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.csv-sample{width:100%;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--t2);font-size:13.5px;font-weight:600;cursor:pointer}
.csv-summary{font-size:13px;color:var(--t2);font-weight:600;margin:2px 2px 12px}
.csv-summary b{color:var(--text)}
.csv-list{max-height:52vh;overflow:auto;margin:0 -4px}
.csv-row{display:flex;align-items:center;gap:11px;padding:11px 6px;cursor:pointer;box-shadow:inset 0 -1px 0 var(--line)}
.csv-row.off{opacity:.38}
.csv-row .ck{width:22px;height:22px;border-radius:7px;border:1.8px solid #D2D4D8;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csv-row.on .ck{background:var(--accent);border-color:var(--accent)}
.csv-row .mid{flex:1;min-width:0}
.csv-row .nm{font-size:14.5px;font-weight:600}
.csv-row .sub{font-size:12px;color:var(--t3);margin-top:1px}
.csv-row .amt{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.auto-note{display:flex;align-items:center;gap:7px;margin:6px 22px 4px;color:var(--t3);font-size:12px;font-weight:500}
.auto-note svg{flex-shrink:0}

.day-label{display:flex;justify-content:space-between;align-items:baseline;padding:16px 24px 7px}
.day-label .d{font-size:13px;font-weight:700;color:var(--text)}
.day-label .d .wk{color:var(--t3);font-weight:500;margin-left:5px}
.day-label .s{font-size:12px;color:var(--t3)}
.day-label .s b{font-weight:700;color:var(--t2)}
.day-label .s b.in{color:var(--income)}

.empty{text-align:center;color:var(--t3);font-size:14px;padding:60px 24px;line-height:1.7}
.empty .ec{width:58px;height:58px;border-radius:18px;background:var(--chip);color:var(--t3);display:flex;align-items:center;justify-content:center;margin:0 auto 15px}

.hero-dark{margin:4px 16px 16px;background:linear-gradient(155deg,#2C2C31 0%,#1A1A1C 60%);border-radius:24px;padding:24px 22px;color:#fff;box-shadow:0 18px 40px -22px rgba(0,0,0,.32)}
.hero-dark .l{font-size:13px;color:#9A9CA3;font-weight:500}
.hero-dark .big{font-size:32px;font-weight:800;letter-spacing:-.045em;margin:5px 0 18px}
.hero-dark .split{display:flex;gap:26px}
.hero-dark .split .l2{font-size:12px;color:#9A9CA3}
.hero-dark .split .v{font-size:15px;font-weight:700;margin-top:3px}

.hero{margin:4px 16px 14px;background:var(--card);border-radius:24px;padding:22px;box-shadow:var(--sh)}
.hero .l{font-size:13px;color:var(--t3);font-weight:500}
.hero .big{font-size:30px;font-weight:800;letter-spacing:-.045em;margin:4px 0 3px}
.hero .big.neg{color:var(--neg)}
.hero .sub{font-size:12.5px;color:var(--t2);margin-bottom:15px;font-weight:500}
.hero .sub b{color:var(--text);font-weight:700}
.hero .sub b.acc{color:var(--accent)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start}
.hero-top .right{text-align:right;font-size:12px;color:var(--t3)}
.hero-top .right b{display:block;font-size:14px;color:var(--text);font-weight:700;margin-top:2px}
.bar{height:9px;background:#EAEAEF;border-radius:5px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .4s cubic-bezier(.2,.7,.2,1)}
.bar>i.warn{background:var(--warn)}
.bar>i.over{background:var(--neg)}
.hero .foot{display:flex;justify-content:space-between;font-size:12px;color:var(--t3);margin-top:9px;font-weight:500}

.bcat{background:var(--card);border-radius:var(--r);padding:15px 17px;margin:0 16px 11px;box-shadow:var(--sh-sm);cursor:pointer}
.bcat .r1{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bcat .nm{font-weight:700;font-size:15px;flex:1;letter-spacing:-.02em}
.bcat .nums{font-size:12.5px;color:var(--t2);font-variant-numeric:tabular-nums;text-align:right;line-height:1.45}
.bcat .nums b{font-weight:700;color:var(--income)}
.bcat .nums b.over{color:var(--neg)}
.bcat.unset{box-shadow:none;border:1px dashed #D9D9DF}
.bcat.unset .set{color:var(--accent);font-weight:600}

.legend{display:flex;gap:18px;justify-content:center;font-size:12px;color:var(--t2);margin-bottom:8px;font-weight:500}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
.legend i.line{width:14px;height:2px;border-radius:0;vertical-align:3px}
.chart-card{margin:0 16px 14px;background:var(--card);border-radius:var(--r);padding:18px 13px 9px;box-shadow:var(--sh)}
.flow{margin:0 16px 14px;background:var(--card);border-radius:var(--r);padding:5px 19px;box-shadow:var(--sh)}
.flow .r{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:14px}
.flow .r:not(:last-child){box-shadow:inset 0 -1px 0 var(--line)}
.flow .r .v{font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.flow .r.plus .v{color:var(--income)}
.flow .r.res span:first-child{font-weight:800}
.flow .r.res .v{font-size:17px;font-weight:800;color:var(--income)}

.sec{margin:0 16px 12px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.sec-h{display:flex;align-items:center;gap:12px;padding:15px 17px}
.sec-h .nm{font-weight:700;font-size:15px;letter-spacing:-.02em}
.sec-h .tot{margin-left:auto;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.sec-h .tot.plus{color:var(--income)}
.add{width:32px;height:32px;border-radius:10px;border:none;background:var(--chip);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.add:active{background:#E5E5EA;transform:scale(.94)}
.frow{display:flex;align-items:center;gap:8px;padding:14px 17px;cursor:pointer;box-shadow:inset 0 1px 0 var(--line)}
.frow:active{background:#FAFAFB}
.frow .nm{font-size:14.5px;font-weight:500}
.frow .meta{font-size:11.5px;color:var(--t2);background:var(--chip);padding:2px 9px;border-radius:20px}
.frow .amt{margin-left:auto;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.frow .amt.neg{color:var(--neg)}
.frow .amt.plus{color:var(--income)}
.frow.none{color:var(--t3);font-size:13px;justify-content:center;cursor:default}
.grp{display:flex;align-items:center;gap:9px;padding:12px 17px;cursor:pointer;box-shadow:inset 0 1px 0 var(--line);background:#FAFAFB}
.grp .ar{color:var(--t3);display:flex}
.grp .gn{font-weight:700;font-size:14px}
.grp .gc{font-size:11px;color:var(--t3);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:1px 8px}
.grp .gt{margin-left:auto;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.frow.sub{padding-left:36px;background:#fff}
.frow.sub .nm{font-size:14px;color:var(--t2)}

.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;width:min(440px,calc(100% - 40px));height:48px;background:linear-gradient(180deg,#19C99B,#12B086);color:#fff;border:none;border-radius:14px;font-size:14.5px;font-weight:700;letter-spacing:-.02em;cursor:pointer;box-shadow:0 8px 20px -8px rgba(19,182,139,.4);z-index:40;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s}
.fab:active{transform:translateX(-50%) scale(.975)}

.tabbar{position:fixed;left:0;right:0;bottom:0;height:66px;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);display:flex;z-index:45;padding-bottom:env(safe-area-inset-bottom)}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;font-weight:600;transition:color .15s}
.tabbar .tb .ico{transition:transform .2s}
.tabbar .tb.act{color:var(--accent)}
.tabbar .tb.act .ico{transform:translateY(-1px) scale(1.06)}

.modal-bg{position:fixed;inset:0;background:rgba(10,10,20,.34);z-index:50;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.on{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);width:100%;max-width:520px;border-radius:26px 26px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(60px)}to{transform:translateY(0)}}
.sheet .grab{width:38px;height:5px;background:#E3E3E8;border-radius:3px;margin:8px auto 18px}
.sheet h3{margin:0 0 18px;font-size:19px;font-weight:800;text-align:center;letter-spacing:-.03em}
.seg{display:flex;background:#ECECF0;border-radius:13px;padding:4px;margin-bottom:16px}
.seg button{flex:1;height:39px;border:none;background:none;border-radius:10px;font-weight:700;font-size:14px;color:var(--t2);cursor:pointer;transition:.18s}
.seg button.act{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(20,20,40,.12)}
.seg button.act.g{color:var(--income)}
.seg button.act.r{color:var(--neg)}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;color:var(--t2);font-weight:600;margin-bottom:8px}
.field label .hint{color:var(--accent);font-weight:700;margin-left:6px}
.amt-input{height:52px!important;font-size:22px!important;font-weight:800;text-align:right;letter-spacing:-.04em}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.chip{height:58px;border:1px solid var(--line);border-radius:14px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:0;color:var(--chip-ic);transition:.15s}
.chip .t{font-size:11.5px;color:var(--t2);font-weight:600}
.chip.act{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.chip.act .t{color:var(--accent);font-weight:700}
.grp-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grp-chips .chip{height:46px;flex-direction:row}
.acts{display:flex;gap:8px;margin-top:20px}
.acts button{flex:1;height:48px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--t2);letter-spacing:-.02em}
.acts button.save{flex:2;background:var(--accent);color:#fff;border-color:var(--accent)}
.acts button.dang{flex:.8;color:var(--neg);border-color:#F3C9CB}
.toast{position:fixed;left:50%;bottom:152px;transform:translateX(-50%) translateY(8px);background:#16171B;color:#fff;padding:13px 22px;border-radius:13px;font-size:13.5px;font-weight:600;z-index:99;opacity:0;transition:.26s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== 리포트 ===== */
.chg{font-size:12px;font-weight:var(--fw-bold);padding:1px 7px;border-radius:7px;margin-left:6px;white-space:nowrap}
.chg.up{color:var(--red);background:#FDECEC}
.chg.down{color:var(--ok);background:#E8F7EF}
.chg.flat{color:var(--t3);background:var(--chip)}
.rcat{display:flex;align-items:center;gap:12px;padding:12px 16px}
.rcat:not(:first-child){box-shadow:inset 0 1px 0 var(--card-bd)}
.rcat .mid{flex:1;min-width:0}
.rcat .nm{font-weight:var(--fw-med);font-size:14.5px}
.rcat .mbar{height:6px;background:var(--chip);border-radius:4px;margin-top:7px;overflow:hidden}
.rcat .mbar>i{display:block;height:100%;background:var(--accent);border-radius:4px}
.rcat .rt{text-align:right;white-space:nowrap}
.rcat .amt{font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;font-size:14.5px}
.splitbar{display:flex;height:32px;border-radius:10px;overflow:hidden;margin:2px 0 11px}
.splitbar i{display:block;height:100%}
.splitbar .fx{background:var(--accent)}
.splitbar .vr{background:#C7CAD1}
.splitleg{display:flex;gap:20px;font-size:12.5px;color:var(--t2);font-weight:var(--fw-med)}
.splitleg i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px}
.splitleg b{color:var(--text);font-weight:var(--fw-bold)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.cal-head span{text-align:center;font-size:11px;color:var(--t3);font-weight:var(--fw-bold)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cday{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:var(--fw-med);background:var(--page-bg);color:var(--t3)}
.cday.spent{background:#fff;border:1px solid var(--card-bd);color:var(--text)}
.cday.nospend{background:#E8F7EF;color:var(--ok);font-weight:var(--fw-bold)}
.cday.nospend .dot{width:5px;height:5px;border-radius:50%;background:var(--ok);margin-top:3px}
.cday.future{opacity:.35}
.streak{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:var(--fw-med);color:var(--text);margin-top:14px;background:#E8F7EF;padding:11px 14px;border-radius:12px}
.streak b{color:var(--ok);font-weight:var(--fw-x)}
.streak .ic{color:var(--ok)}
/* 목표 저금통 */
.goal{background:var(--card-bg);border-radius:var(--r-lg);padding:15px 16px;margin:0 16px 11px;box-shadow:var(--el-1);cursor:pointer}
.goal .gh{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.goal .gh .ic{width:32px;height:32px;border-radius:10px}
.goal .gh .nm{font-weight:var(--fw-bold);font-size:15px;flex:1}
.goal .gh .pct{font-weight:var(--fw-x);font-size:16px;color:var(--accent);font-variant-numeric:tabular-nums}
.goal .nums{display:flex;justify-content:space-between;font-size:12.5px;color:var(--t2);margin-bottom:8px;font-variant-numeric:tabular-nums}
.goal .nums b{color:var(--text);font-weight:var(--fw-bold)}
.goal .eta{font-size:12.5px;color:var(--t2);margin-top:10px;font-weight:var(--fw-med)}
.goal .eta b{color:var(--ok);font-weight:var(--fw-bold)}
.goal .eta.warn b{color:var(--red)}

/* ===== 소비 다이어리 (파스텔) ===== */
.diary-card{margin:0 16px 12px;background:linear-gradient(135deg,#E9F7F1 0%,#F2EFFA 100%);border-radius:22px;padding:16px 16px 15px;box-shadow:var(--el-1)}
.dc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.dc-t{font-size:15px;font-weight:var(--fw-bold);letter-spacing:-.02em}
.dc-date{font-size:12px;color:var(--t2);font-weight:var(--fw-med)}
.mood-row{display:flex;gap:5px;margin-bottom:13px}
.mface{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 0;border-radius:14px;transition:transform .13s cubic-bezier(.2,.8,.2,1),background .13s}
.mface svg{opacity:.45;transition:opacity .13s,transform .13s}
.mface span{font-size:11px;color:var(--t3);font-weight:var(--fw-med)}
.mface.on{background:rgba(255,255,255,.72)}
.mface.on svg{opacity:1;transform:scale(1.14)}
.mface.on span{color:var(--text);font-weight:var(--fw-bold)}
.mface:active{transform:scale(.92)}
.dc-memo{background:rgba(255,255,255,.78);border:1px solid rgba(0,0,0,.04);height:46px;border-radius:14px}
.dc-memo:focus{border-color:var(--accent);box-shadow:none}
/* 기분 캘린더 셀 */
.cday.moodc{background:#fff;border:1px solid var(--card-bd);padding:2px 0}
.cday.moodc svg{display:block}
.cday .dnum2{font-size:9px;color:var(--t3);margin-top:1px;font-weight:var(--fw-med)}
/* 월말 회고 */
.recap{display:flex;gap:6px;align-items:flex-end;justify-content:space-around;margin-bottom:12px}
.rec-m{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.rec-bar{width:20px;height:54px;background:var(--chip);border-radius:7px;display:flex;align-items:flex-end;overflow:hidden}
.rec-bar>i{width:100%;border-radius:7px;display:block;min-height:3px;transition:height .4s cubic-bezier(.2,.8,.2,1)}
.rec-m span{font-size:12px;font-weight:var(--fw-bold);color:var(--t2)}
.recap-msg{text-align:center;font-size:13.5px;font-weight:var(--fw-med);color:var(--text);background:var(--accent-bg);padding:11px;border-radius:13px}

/* 말랑 인터랙션 */
.row.tap,.bcat,.goal,.chip,.frow,.upload-btn,.csv-row,.add{transition:transform .13s cubic-bezier(.2,.8,.2,1),background .13s ease}
.bcat:active,.goal:active,.chip:active,.frow:active,.upload-btn:active,.csv-row:active{transform:scale(.975)}
.add:active{transform:scale(.9)}
.tabbar .tb{transition:transform .14s cubic-bezier(.2,.8,.2,1),color .14s ease}
.tabbar .tb:active{transform:scale(.9)}
[data-cnt]{font-variant-numeric:tabular-nums}

.hide{display:none!important}

/* ===== 사이드바 (데스크탑 전용) ===== */
.sidebar{display:none}
.hdr-add{display:none}
.sb-logo{font-size:23px;font-weight:var(--fw-x);letter-spacing:-.04em;padding:6px 14px 22px}
.sb-logo b{color:var(--accent)}
.sb-nav{display:flex;flex-direction:column;gap:4px}
.sb-item{display:flex;align-items:center;gap:12px;height:44px;padding:0 14px;border-radius:12px;border:none;background:none;cursor:pointer;color:var(--t2);font-size:14.5px;font-weight:var(--fw-med);font-family:inherit;text-align:left;width:100%;letter-spacing:-.02em;transition:background .12s}
.sb-item:hover{background:var(--page-bg)}
.sb-item.act{background:var(--accent);color:var(--on-accent)}
.sb-profile{margin-top:auto;display:flex;align-items:center;gap:11px;padding:12px;border-radius:15px;background:var(--page-bg)}
.sb-profile .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2C2C31,#1A1A1C);flex:0 0 auto}
.sb-profile .nm{font-size:14px;font-weight:var(--fw-bold)}
.sb-profile .em{font-size:11.5px;color:var(--t3);margin-top:1px}

/* ===== 데스크탑 = 사이드바 + 다열 대시보드 ===== */
@media(min-width:960px){
  .sidebar{display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;width:264px;background:var(--card-bg);border-right:1px solid var(--card-bd);padding:22px 16px;z-index:30}
  .tabbar,.fab{display:none!important}
  .shell{max-width:1180px;margin:0 auto 0 264px;padding:8px 32px 48px;background:none}
  .hdr{padding:22px 4px 8px}
  .hdr .logo{display:none}
  .hdr-add{display:inline-flex;align-items:center;gap:6px;margin-left:auto;height:38px;padding:0 16px;border-radius:11px;border:none;background:var(--accent);color:var(--on-accent);font-size:13.5px;font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;letter-spacing:-.02em}
  .month-nav{justify-content:flex-start;padding:2px 4px 14px}
  /* 카드 좌우 마진 제거(그리드 갭이 대신) */
  .summary,.quick,.q-hint,.upload-btn,.auto-note,.card,.hero,.hero-dark,.bcat,.chart-card,.flow,.sec,.lbl-row,.goal,.diary-card{margin-left:0;margin-right:0}
  .diary-card{max-width:720px}
  .lbl-row{padding-left:6px;padding-right:6px}
  /* 가계부: 컨트롤은 폭 넓게, 내역은 2열 */
  .summary{max-width:560px}
  .quick{max-width:720px}
  #list{column-count:2;column-gap:20px;margin-top:6px}
  #list .day-block{break-inside:avoid;margin-bottom:8px}
  /* 예산: 카드 2열 그리드 */
  #bcat-list{column-count:2;column-gap:20px}
  #bcat-list .bcat{break-inside:avoid}
  #bg-hero{max-width:640px}
  /* 자산: 순자산 폭 제한 + 자산/부채 2열 */
  #asset-hero{max-width:640px}
  #asset-list{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  /* 예측: 히어로/흐름 폭 제한, 재료 2열 */
  #fc-hero,.flow,.chart-card,.goal,#report-body{max-width:720px}
  #fc-secs{column-count:2;column-gap:20px}
  #fc-secs .sec{break-inside:avoid;margin-bottom:14px}
}
@media(min-width:1320px){
  #list,#bcat-list,#fc-secs{column-count:3}
}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">머니<b>.</b></div>
  <nav class="sb-nav">
    <button class="sb-item act" id="sb-ledger" onclick="switchTab('ledger')"></button>
    <button class="sb-item" id="sb-budget" onclick="switchTab('budget')"></button>
    <button class="sb-item" id="sb-asset" onclick="switchTab('asset')"></button>
    <button class="sb-item" id="sb-forecast" onclick="switchTab('forecast')"></button>
    <button class="sb-item" id="sb-report" onclick="switchTab('report')"></button>
  </nav>
  <div class="sb-profile"><span class="av"></span><div class="info"><div class="nm">내 가계부</div><div class="em">이 기기 · 동기화 예정</div></div></div>
</aside>
<div class="shell">
  <div class="hdr">
    <div class="logo">머니<b>.</b></div>
    <button class="cloud" id="acct" onclick="openAuth()"><span class="dot" id="acct-dot"></span><span id="acct-t">로그인</span></button>
    <button class="hdr-add" id="hdr-add" onclick="onFab()"></button>
  </div>

  <div class="month-nav" id="month-nav">
    <button onclick="moveMonth(-1)" id="mn-prev"></button>
    <div class="m" id="month-label">2026. 6월</div>
    <button onclick="moveMonth(1)" id="mn-next"></button>
  </div>

  <div id="pane-ledger">
    <div class="summary">
      <div class="sum-box"><div class="l">수입</div><div class="v inc tnum" id="sum-in">0</div></div>
      <div class="sum-box"><div class="l">지출</div><div class="v tnum" id="sum-out">0</div></div>
      <div class="sum-box"><div class="l">남음</div><div class="v tnum" id="sum-bal">0</div></div>
    </div>
    <div class="quick">
      <input id="q-in" type="text" placeholder="스타벅스 4500  —  엔터로 바로 기록" oninput="qPreview()" onkeydown="if(event.key==='Enter')quickAdd()">
      <button class="qbtn" id="q-btn" onclick="quickAdd()"></button>
    </div>
    <div class="q-hint" id="q-hint"></div>
    <button class="upload-btn" id="upload-btn" onclick="openCSV()"></button>
    <div class="auto-note" id="auto-note"></div>
    <div id="diary-today"></div>
    <div id="list"></div>
  </div>

  <div id="pane-budget" class="hide">
    <div class="hero" id="bg-hero"></div>
    <div class="lbl-row"><span class="t">카테고리별 예산</span><span class="mini" onclick="openBudgetPick()">예산 설정</span></div>
    <div id="bcat-list"></div>
  </div>

  <div id="pane-asset" class="hide">
    <div class="hero-dark" id="asset-hero"></div>
    <div id="asset-list"></div>
  </div>

  <div id="pane-forecast" class="hide">
    <div class="hero" id="fc-hero"></div>
    <div class="hero hide" id="fc-warn" style="background:#FEF1F1;box-shadow:none;padding:14px 16px;display:flex;align-items:center;gap:9px;color:var(--neg);font-size:13px;font-weight:600"></div>
    <div class="chart-card" id="fc-chart"></div>
    <div class="lbl-row"><span class="t">월 평균 흐름</span></div>
    <div class="flow" id="fc-flow"></div>
    <div class="lbl-row"><span class="t">목표 저금통</span><span class="mini" onclick="openGoal()">＋ 목표 추가</span></div>
    <div id="goal-list"></div>
    <div class="lbl-row"><span class="t">예측 재료 · 등록하면 12개월에 자동 반영</span></div>
    <div id="fc-secs"></div>
  </div>

  <!-- 리포트 -->
  <div id="pane-report" class="hide">
    <div id="report-body"></div>
  </div>
</div>

<button class="fab" id="fab" onclick="onFab()"></button>

<div class="tabbar">
  <button class="tb act" id="tb-ledger" onclick="switchTab('ledger')"></button>
  <button class="tb" id="tb-budget" onclick="switchTab('budget')"></button>
  <button class="tb" id="tb-asset" onclick="switchTab('asset')"></button>
  <button class="tb" id="tb-forecast" onclick="switchTab('forecast')"></button>
  <button class="tb" id="tb-report" onclick="switchTab('report')"></button>
</div>

<div class="modal-bg" id="sheet-bg"><div class="sheet">
  <div class="grab"></div><h3>내역 추가</h3>
  <div class="seg"><button id="t-exp" class="act" onclick="setType('exp')">지출</button><button id="t-inc" onclick="setType('inc')">수입</button></div>
  <div class="field"><label>금액 (원)</label><input id="f-amt" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="field"><label>메모 · 가맹점 <span class="hint" id="classify-hint"></span></label><input id="f-memo" type="text" placeholder="예: 스타벅스, 도시가스" maxlength="40" oninput="autoClassify()"></div>
  <div class="field"><label>날짜</label><input id="f-date" type="date"></div>
  <div class="field"><label>카테고리</label><div class="cat-grid" id="cat-grid"></div></div>
  <div class="acts"><button onclick="closeSheet('sheet-bg')">취소</button><button class="save" onclick="saveTx()">저장</button></div>
</div></div>

<div class="modal-bg" id="budget-bg"><div class="sheet">
  <div class="grab"></div><h3 id="budget-title">예산 설정</h3>
  <div class="field" id="budget-pick-wrap"><label>카테고리</label><div class="cat-grid" id="budget-cat-grid"></div></div>
  <div class="field"><label>한 달 예산 (원)</label><input id="b-amt" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="acts"><button onclick="closeSheet('budget-bg')">취소</button><button class="dang hide" id="b-del" onclick="delBudget()">삭제</button><button class="save" onclick="saveBudget()">저장</button></div>
</div></div>

<div class="modal-bg" id="asset-bg"><div class="sheet">
  <div class="grab"></div><h3 id="asset-title">자산 추가</h3>
  <div class="seg"><button id="a-asset" class="act" onclick="setAssetKind('asset')">자산</button><button id="a-debt" onclick="setAssetKind('debt')">부채</button></div>
  <div class="field"><label>이름</label><input id="a-name" type="text" placeholder="예: 국민은행 통장" maxlength="24"></div>
  <div class="field"><label>종류</label><select id="a-type"></select></div>
  <div class="field"><label>잔액 (원)</label><input id="a-bal" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="acts"><button onclick="closeSheet('asset-bg')">취소</button><button class="dang hide" id="a-del" onclick="delAsset()">삭제</button><button class="save" onclick="saveAsset()">저장</button></div>
</div></div>

<div class="modal-bg" id="fc-bg"><div class="sheet">
  <div class="grab"></div><h3 id="fc-title">항목 추가</h3>
  <div class="field"><label id="fc-name-lbl">이름</label><input id="fc-name" type="text" maxlength="24" placeholder="예: 넷플릭스"></div>
  <div class="field"><label id="fc-amt-lbl">금액 (원)</label><input id="fc-amt" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="field hide" id="fc-group-wrap"><label>그룹</label><div class="grp-chips" id="fc-group-chips"></div><input id="fc-group" type="text" placeholder="새 그룹 직접 입력" maxlength="16" style="margin-top:8px"></div>
  <div class="field hide" id="fc-left-wrap"><label>남은 개월수 (이 개월 뒤 자동 종료)</label><input id="fc-left" type="number" inputmode="numeric" placeholder="예: 5"></div>
  <div class="field hide" id="fc-month-wrap"><label>결제 달</label><select id="fc-month"></select></div>
  <div class="acts"><button onclick="closeSheet('fc-bg')">취소</button><button class="dang hide" id="fc-del" onclick="delFc()">삭제</button><button class="save" onclick="saveFc()">저장</button></div>
</div></div>

<div class="modal-bg" id="auth-bg"><div class="sheet">
  <div class="grab"></div><h3 id="auth-title">로그인하고 동기화</h3>
  <div id="auth-body"></div>
</div></div>

<div class="modal-bg" id="goal-bg"><div class="sheet">
  <div class="grab"></div><h3 id="goal-title">목표 저금통</h3>
  <div class="field"><label>목표 이름</label><input id="g-name" type="text" maxlength="20" placeholder="예: 유럽 여행"></div>
  <div class="field"><label>목표 금액 (원)</label><input id="g-target" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="field"><label>지금까지 모은 금액 (원)</label><input id="g-saved" class="amt-input tnum" type="number" inputmode="numeric" placeholder="0"></div>
  <div class="acts"><button onclick="closeSheet('goal-bg')">취소</button><button class="dang hide" id="g-del" onclick="delGoal()">삭제</button><button class="save" onclick="saveGoal()">저장</button></div>
</div></div>

<div class="modal-bg" id="csv-bg"><div class="sheet">
  <div class="grab"></div><h3 id="csv-title">카드 명세서 올리기</h3>
  <div id="csv-step1">
    <p class="csv-desc">카드사 홈페이지·앱에서 받은 <b>이용내역 CSV</b> 파일을 올리면 날짜·가맹점·금액을 자동으로 읽고 카테고리까지 분류해드려요. 미리보기에서 확인 후 한 번에 추가됩니다.</p>
    <button class="csv-pick" id="csv-pick" onclick="document.getElementById('csv-file').click()">파일 선택</button>
    <button class="csv-sample" onclick="loadSample()">파일 없이 샘플로 시연해보기</button>
    <input type="file" id="csv-file" accept=".csv,text/csv" class="hide" onchange="handleFile(event)">
  </div>
  <div id="csv-step2" class="hide">
    <div class="csv-summary" id="csv-summary"></div>
    <div class="csv-list" id="csv-list"></div>
    <div class="acts"><button onclick="closeSheet('csv-bg')">취소</button><button class="save" id="csv-add" onclick="addCsv()">추가</button></div>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* ===== 아이콘 ===== */
const ICONS={
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3"/>',
  wallet:'<path d="M3 7a2 2 0 0 1 2-2h12v3"/><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2H6"/><circle cx="17" cy="13" r="1.2"/>',
  chart:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
  utensils:'<path d="M4 3v6a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V3"/><path d="M6 11v10"/><path d="M18 3c-1.5 0-2.5 2-2.5 5.5V13H18"/><path d="M18 3v18"/>',
  coffee:'<path d="M17 8h1.5a3 3 0 0 1 0 6H17"/><path d="M3 8h14v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><path d="M6 2v2"/><path d="M10 2v2"/><path d="M14 2v2"/>',

    RECUR.forEach(s=>{if(postRule('recur',s,ym,'exp'))added++;});

}
function postRule(src,s,ym,type){
  const key=src+':'+s.id+':'+ym;
  if(DB.autoPosted[key])return false;
  const day=String(Math.min(s.day||1,28)).padStart(2,'0');
  const cat=classify(s.name,type)||(type==='inc'?'급여':'기타');
  const tx={id:nextId(),type,cat,amt:s.amt,memo:s.name,date:ym+'-'+day,auto:true};
  TX.push(tx);DB.autoPosted[key]=tx.id;return true;
}

function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let text;try{text=new TextDecoder('utf-8',{fatal:false}).decode(reader.result);}catch(_){text='';}
    if(text.indexOf('�')>=0){try{text=new TextDecoder('euc-kr').decode(reader.result);}catch(_){}}
    const rows=parseCSV(text);
    if(!rows.length){toast('명세서를 읽지 못했어요. CSV 형식인지 확인해 주세요');return;}
    renderReview(rows);
  };
  reader.readAsArrayBuffer(f);e.target.value='';
}
function splitCSVLine(line){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if((ch===','||ch==='\t'||ch===';')&&!q){out.push(cur);cur='';}
    else cur+=ch;}
  out.push(cur);return out.map(c=>c.trim());
}
function parseCSV(text){
  const lines=(text||'').split(/\r?\n/).filter(l=>l.trim());
  const out=[];
  lines.forEach(line=>{
    const dm=line.match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
    if(!dm)return; // 날짜 없는 줄(헤더 등)은 건너뜀
    const date=dm[1]+'-'+pad2(dm[2])+'-'+pad2(dm[3]);
    const rest=line.replace(dm[0],' ');
    let amount=null;(rest.match(/\d{1,3}(?:,\d{3})+|\d{3,}/g)||[]).forEach(t=>{const v=parseInt(t.replace(/,/g,''),10);if(v>=100&&(amount==null||v>amount))amount=v;});
    let best='';splitCSVLine(line).forEach(c=>{if(/[가-힣A-Za-z]/.test(c)&&!/^\d{4}[.\-/]/.test(c)&&!/^[\d,]+$/.test(c)&&c.length>best.length)best=c;});
    if(date&&amount)out.push({date,merchant:best||'카드결제',amount});
  });
  return out;
}

  const seen=new Set(TX.map(t=>t.date+'|'+t.amt+'|'+t.memo));

function parseQuick(text){
  let s=(text||'').trim();if(!s)return null;
  const re=/(\d[\d,]*)\s*(만|천)?\s*원?/g;let m,last=null;
  while((m=re.exec(s))!==null){last=m;if(re.lastIndex===m.index)re.lastIndex++;}
  if(!last)return null;
  let amt=parseFloat(last[1].replace(/,/g,''));if(last[2]==='만')amt*=10000;else if(last[2]==='천')amt*=1000;
  if(!amt||amt<=0)return null;
  let merchant=(s.slice(0,last.index)+s.slice(last.index+last[0].length)).replace(/\+/g,' ').replace(/\s+/g,' ').trim();
  const type=(/^\s*\+/.test(text)||/수입|입금|월급|급여|이자|환급/.test(s))?'inc':'exp';
  const cat=classify(merchant,type)||(type==='inc'?'부수입':'기타');
  return {type,amt:Math.round(amt),merchant,cat};
}

function fcMonths(){const arr=[];let [y,m]=FC_START.split('-').map(Number);for(let i=0;i<12;i++){arr.push({y,m,label:m+'월'});m++;if(m>12){m=1;y++;}}return arr;}
function computeForecast(){
  const months=fcMonths();
  const income=INCOME.reduce((a,b)=>a+b.amt,0),fixed=RECUR.reduce((a,b)=>a+b.amt,0);
  const startBal=ASSET.filter(a=>a.kind==='asset'&&LIQUID.includes(a.type)).reduce((a,b)=>a+b.bal,0);
  let cum=startBal;
  return months.map((mo,i)=>{
    const inst=INSTALL.filter(x=>x.left>i).reduce((a,b)=>a+b.amt,0);
    const loan=LOAN.filter(x=>x.left>i).reduce((a,b)=>a+b.amt,0);
    const ev=EVENT.filter(x=>x.mi===i).reduce((a,b)=>a+b.amt,0);
    const surplus=income-fixed-inst-loan-ev;cum+=surplus;
    return Object.assign({},mo,{income,fixed,inst,loan,ev,surplus,cum,startBal});
  });
}
function fcChart(data){
  const W=340,H=150,padL=6,padR=6,padT=10,padB=18,n=data.length,cw=(W-padL-padR)/n,bw=cw*0.46;
  const sVals=data.map(d=>d.surplus),posMax=Math.max(0,...sVals),negMax=Math.max(0,...sVals.map(v=>-v)),range=(posMax+negMax)||1;
  const plotH=H-padT-padB,zeroY=padT+plotH*(posMax/range);
  const cums=data.map(d=>d.cum),cMax=Math.max(...cums),cMin=Math.min(...cums),cRange=(cMax-cMin)||1;
  const cy=v=>padT+plotH*(1-(v-cMin)/cRange);
  let bars='',line='',dots='',labels='';
  data.forEach((d,i)=>{
    const cx=padL+cw*i+cw/2,bx=cx-bw/2;
    if(d.surplus>=0){const h=plotH*d.surplus/range;bars+='<rect x="'+bx.toFixed(1)+'" y="'+(zeroY-h).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2.5" fill="#D6D8DC"/>';}
    else{const h=plotH*(-d.surplus)/range;bars+='<rect x="'+bx.toFixed(1)+'" y="'+zeroY.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2.5" fill="#EBC7C7"/>';}
    const py=cy(d.cum);line+=(i===0?'M':'L')+cx.toFixed(1)+' '+py.toFixed(1)+' ';
    dots+='<circle cx="'+cx.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="2.2" fill="#13B68B"/>';
    if(i%2===0||i===n-1)labels+='<text x="'+cx.toFixed(1)+'" y="'+(H-5)+'" text-anchor="middle" font-size="8.5" fill="#A8ABB2">'+d.label+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%">'+(negMax>0?'<line x1="'+padL+'" y1="'+zeroY.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+zeroY.toFixed(1)+'" stroke="#ECEDEF"/>':'')+bars+'<path d="'+line+'" fill="none" stroke="#13B68B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'+dots+labels+'</svg>';
}

function dayTap(dt){const e=DIARY[dt];if(e&&e.memo)toast((+dt.slice(8,10))+'일 · '+e.memo);}
function recapHTML(ym){

function prevYM(ym){let [y,m]=ym.split('-').map(Number);m--;if(m<1){m=12;y--;}return y+'-'+String(m).padStart(2,'0');}
function expByCat(ym){const o={};TX.filter(t=>t.type==='exp'&&t.date.startsWith(ym)).forEach(t=>o[t.cat]=(o[t.cat]||0)+t.amt);return o;}
function chgBadge(cur,prev){if(prev<=0)return cur>0?'<span class="chg flat">신규</span>':'';const d=Math.round((cur-prev)/prev*100);if(d===0)return '<span class="chg flat">±0%</span>';return '<span class="chg '+(d>0?'up':'down')+'">'+(d>0?'+':'')+d+'%</span>';}
function renderReport(){
  const ym=curYM,pym=prevYM(ym);
  const exp=TX.filter(t=>t.type==='exp'&&t.date.startsWith(ym)).reduce((a,b)=>a+b.amt,0);
  const pexp=TX.filter(t=>t.type==='exp'&&t.date.startsWith(pym)).reduce((a,b)=>a+b.amt,0);
  const cat=expByCat(ym),pcat=expByCat(pym);
  let fixed=0,vary=0;TX.filter(t=>t.type==='exp'&&t.date.startsWith(ym)).forEach(t=>{if(t.auto)fixed+=t.amt;else vary+=t.amt;});
  const varDays=new Set();TX.filter(t=>t.type==='exp'&&!t.auto&&t.date.startsWith(ym)).forEach(t=>varDays.add(+t.date.slice(8,10)));
  let html='';
  html+='<div class="hero"><div class="hero-top"><div><div class="l">이번 달 지출</div><div class="big tnum"><span data-cnt="'+exp+'">0</span><span style="font-size:15px;color:var(--t3);font-weight:600"> 원</span></div></div><div style="text-align:right">'+chgBadge(exp,pexp)+'<div style="font-size:12px;color:var(--t3);margin-top:6px">전월 '+wonShort(pexp)+'</div></div></div></div>';
  const cats=Object.keys(cat).sort((a,b)=>cat[b]-cat[a]).slice(0,6),maxC=cats.length?cat[cats[0]]:1;
  html+='<div class="lbl-row"><span class="t">많이 쓴 카테고리</span></div><div class="card">';
  if(!cats.length)html+='<div class="rcat"><span class="nm" style="color:var(--t3)">지출 내역이 없어요</span></div>';
  cats.forEach(c=>{html+='<div class="rcat"><div class="ic sm" style="'+catStyle(c)+'">'+icon(CAT_IC[c]||'more',17)+'</div><div class="mid"><div class="nm">'+c+'</div><div class="mbar"><i style="width:'+Math.round(cat[c]/maxC*100)+'%;background:'+catColor(c)+'"></i></div></div><div class="rt"><div class="amt">'+won(cat[c])+'</div>'+chgBadge(cat[c],pcat[c]||0)+'</div></div>';});
  html+='</div>';
  const tot=fixed+vary||1;
  html+='<div class="lbl-row"><span class="t">고정비 vs 변동비</span></div><div class="card" style="padding:16px"><div class="splitbar"><i class="fx" style="width:'+(fixed/tot*100)+'%"></i><i class="vr" style="width:'+(vary/tot*100)+'%"></i></div><div class="splitleg"><span><i style="background:var(--accent)"></i>고정비 <b>'+won(fixed)+'</b></span><span><i style="background:#C7CAD1"></i>변동비 <b>'+won(vary)+'</b></span></div></div>';
  html+='<div class="lbl-row"><span class="t">무지출 챌린지 <span style="color:var(--t3);font-weight:500">· 내가 쓴 변동지출 기준</span></span></div><div class="card" style="padding:16px">'+calHTML(ym,varDays)+'</div>';
  html+=recapHTML(ym);
  document.getElementById('report-body').innerHTML=html;
  animCounts(document.getElementById('report-body'));
}
function calHTML(ym,varDays){
  const [y,m]=ym.split('-').map(Number),days=new Date(y,m,0).getDate(),first=new Date(y,m-1,1).getDay();
  const todayD=(ym===TODAY.slice(0,7))?+TODAY.slice(8,10):days;
  const wk=['일','월','화','수','목','금','토'];
  let cells='',nospend=0;
  for(let i=0;i<first;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const dstr=ym+'-'+String(d).padStart(2,'0'),future=d>todayD,spent=varDays.has(d),e=DIARY[dstr],hasMood=e&&e.mood!=null;
    if(!future&&!spent)nospend++;
    let cls='cday',inner;
    if(hasMood){cls+=' moodc';inner=moodFace(e.mood,24)+'<span class="dnum2">'+d+'</span>';}
    else{if(future)cls+=' future';else if(spent)cls+=' spent';else cls+=' nospend';inner='<span class="dnum">'+d+'</span>'+((!future&&!spent)?'<span class="dot"></span>':'');}
    cells+='<div class="'+cls+'" onclick="dayTap(\''+dstr+'\')">'+inner+'</div>';
  }
  let cur=0;for(let d=todayD;d>=1;d--){if(varDays.has(d))break;cur++;}
  return '<div class="cal-head">'+wk.map(w=>'<span>'+w+'</span>').join('')+'</div><div class="cal">'+cells+'</div><div class="streak">'+icon('fire',17)+'<span>이번 달 무지출 <b>'+nospend+'일</b> · 현재 연속 <b>'+cur+'일</b></span></div>';
}

let fbUser=null,fbDB=null,fbAuth=null,_rtUnsub=null,_pushT=null,_pushedTs='',_pendingCloud=null;
function initFb(att){att=att||0;
  if(typeof firebase==='undefined'){if(att<40)setTimeout(()=>initFb(att+1),150);else console.warn('Firebase SDK 로드 실패(오프라인?)');return;}

function cloudRef(){return fbDB.collection('users').doc(fbUser.uid).collection('data').doc('money');}
function cloudPush(){
  if(!fbUser||!fbDB)return;
  clearTimeout(_pushT);
  _pushT=setTimeout(function(){
    const ts=Date.now()+'_'+Math.floor(Math.random()*100000);_pushedTs=ts;
    cloudRef().set({value:JSON.stringify(DB),ts:ts,at:new Date().toISOString()}).catch(function(e){console.error('cloud push',e);if(e.code==='permission-denied')toast('동기화 권한 오류 — 규칙 확인 필요');});
  },700);
}
function startCloudSync(){
  if(!fbUser||!fbDB)return;
  if(_rtUnsub){try{_rtUnsub();}catch(e){}_rtUnsub=null;}
  let first=true;
  _rtUnsub=cloudRef().onSnapshot(function(snap){
    if(snap.metadata&&snap.metadata.hasPendingWrites)return;
    if(!snap.exists){cloudPush();first=false;return;}
    const d=snap.data();if(!d||!d.value)return;
    if(d.ts&&d.ts===_pushedTs)return;
    let data;try{data=JSON.parse(d.value);}catch(e){return;}
    if(!data)return;
    if(isBusy()){_pendingCloud=data;return;}
    applyCloud(data,!first);first=false;
  },function(e){console.error('onSnapshot',e);if(e.code==='permission-denied')toast('동기화 권한 오류 — 규칙 확인 필요');});
}
function stopCloudSync(){if(_rtUnsub){try{_rtUnsub();}catch(e){}_rtUnsub=null;}}
function isBusy(){if(document.querySelector('.modal-bg.on'))return true;const a=document.activeElement;return a&&/^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName);}
function flushPendingCloud(){if(_pendingCloud&&!isBusy()){const d=_pendingCloud;_pendingCloud=null;applyCloud(d,true);}}
function applyCloud(data,notify){
  DB=data;TX=DB.tx||[];BUD=DB.budget||{};ASSET=DB.asset||[];INCOME=DB.income||[];RECUR=DB.recur||[];INSTALL=DB.install||[];LOAN=DB.loan||[];EVENT=DB.event||[];GOALS=DB.goals||[];DIARY=DB.diary||{};if(!DB.autoPosted)DB.autoPosted={};
  localStorage.setItem(LS_KEY,JSON.stringify(DB));
  render();
  if(notify)toast('다른 기기 변경이 반영됐어요');
}

}
function doLogin(){const e=document.getElementById('lg-email').value.trim(),p=document.getElementById('lg-pw').value;if(!e||!p){toast('이메일·비밀번호를 입력해 주세요');return;}if(!fbAuth){toast('연결 준비 중 — 잠시 후 다시');return;}fbAuth.signInWithEmailAndPassword(e,p).then(function(){closeSheet('auth-bg');toast('로그인됨 · 동기화 시작');}).catch(function(err){toast(authMsg(err));});}
function doSignup(){const e=document.getElementById('lg-email').value.trim(),p=document.getElementById('lg-pw').value;if(!e||!p){toast('이메일·비밀번호를 입력해 주세요');return;}if(p.length<6){toast('비밀번호는 6자 이상');return;}if(!fbAuth){toast('연결 준비 중 — 잠시 후 다시');return;}fbAuth.createUserWithEmailAndPassword(e,p).then(function(){closeSheet('auth-bg');toast('계정 생성·로그인됨');}).catch(function(err){toast(authMsg(err));});}
function doLogout(){if(fbAuth)fbAuth.signOut();stopCloudSync();closeSheet('auth-bg');toast('로그아웃됨 (데이터는 이 기기에 남아있어요)');}
function authMsg(err){const c=err&&err.code||'';if(c.indexOf('wrong-password')>=0||c.indexOf('invalid-credential')>=0)return '비밀번호가 틀려요';if(c.indexOf('user-not-found')>=0)return '없는 계정이에요 · 새로 만들어 주세요';if(c.indexOf('email-already')>=0)return '이미 가입된 이메일 · 로그인해 주세요';if(c.indexOf('invalid-email')>=0)return '이메일 형식을 확인해 주세요';if(c.indexOf('weak-password')>=0)return '비밀번호는 6자 이상';if(c.indexOf('network')>=0)return '인터넷 연결을 확인해 주세요';return '오류: '+c;}

autoPost();paintStatic();render();setAcct();initFb();
</script>
